name: mutation

# crucible runs its own Action against its own code. If the mutation gate is
# worth asking of you, it is worth surviving here first.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mutation score
        uses: ./
        with:
          # no module: grade the 8-module [tool.mutmut] scope this repo already
          # maintains, rather than clobbering it. Dogfood means dogfood.
          fail-under: "95"
