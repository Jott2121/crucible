name: mutation

# crucible runs its own Action against its own code, and publishes its own badge
# from the result. If the gate is worth asking of you, it survives here first --
# and the number on the README is the one CI actually measured, not one I typed.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write        # to publish the badge payload to the badges branch
  pull-requests: write   # to comment the score on a PR

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Mutation score
        id: mutation
        uses: ./
        with:
          # no module: grade the 8-module [tool.mutmut] scope this repo already
          # maintains, rather than clobbering it. Dogfood means dogfood.
          fail-under: "95"
          badge-file: mutation.json

      - name: Publish the badge
        # main only: a PR must never be able to move the badge on the README
        if: github.ref == 'refs/heads/main'
        env:
          SCORE: ${{ steps.mutation.outputs.score }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # an orphan branch: the badge payload has no business carrying the
          # repo's history around with it
          git checkout --orphan badges
          git rm -rf --cached . >/dev/null 2>&1 || true
          find . -maxdepth 1 ! -name mutation.json ! -name .git ! -name . -exec rm -rf {} + || true
          git add -f mutation.json
          git commit -q -m "mutation score: ${SCORE}%"
          git push -f origin badges
