name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday 04:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: python
          queries: security-extended
          # Experiment receipt dirs hold MODEL-GENERATED test files archived as
          # frozen, append-only evidence (PROTOCOL.md / PROTOCOL-B.md) -- data,
          # not product code. Alerts there cannot be "fixed" (editing a receipt
          # corrupts the pre-registered record), so the dirs are excluded.
          # Jeff-approved 2026-07-13 (alert #1 triage).
          config: |
            paths-ignore:
              - experiments/runs
              - experiments/runs-b
              - experiments/seeds

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: "/language:python"
